version: "3.9"

# ─────────────────────────────────────────────
#  Codity Jobs — Docker Compose
#  Services: postgres, api, worker, dashboard
# ─────────────────────────────────────────────

services:

  # ── PostgreSQL Database ───────────────────
  postgres:
    image: postgres:15-alpine
    container_name: codity_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-codity_jobs}
      POSTGRES_USER: ${DATABASE_USER:-codity}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-codity_secret}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-codity} -d ${DATABASE_NAME:-codity_jobs}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codity_network

  # ── REST API ──────────────────────────────
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: codity_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DATABASE_USER:-codity}:${DATABASE_PASSWORD:-codity_secret}@postgres:5432/${DATABASE_NAME:-codity_jobs}
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    ports:
      - "${PORT:-3000}:3000"
    networks:
      - codity_network

  # ── Worker Service (scale as needed) ─────
  worker:
    build:
      context: .
      dockerfile: packages/worker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DATABASE_USER:-codity}:${DATABASE_PASSWORD:-codity_secret}@postgres:5432/${DATABASE_NAME:-codity_jobs}
      WORKER_POLL_INTERVAL_MS: ${WORKER_POLL_INTERVAL_MS:-2000}
      WORKER_HEARTBEAT_INTERVAL_MS: ${WORKER_HEARTBEAT_INTERVAL_MS:-30000}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
    deploy:
      replicas: 2
    networks:
      - codity_network

  # ── Dashboard (Vite production build) ────
  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
    container_name: codity_dashboard
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"
    networks:
      - codity_network

volumes:
  postgres_data:
    driver: local

networks:
  codity_network:
    driver: bridge
